<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Gradients</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); padding: 24px; display: flex; flex-direction: column; gap: 10px; }
  .grad { display: flex; align-items: center; gap: 16px; }
  .bar { flex: 1; height: 44px; border-radius: var(--radius-md); }
  .name { width: 130px; font-size: 12px; font-weight: 500; }
  .stops { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); width: 220px; text-align: right; }
</style>
</head>
<body>
  <div class="grad"><div class="name">Hot Pink</div><div class="bar" style="background: var(--grad-hot-pink)"></div><div class="stops">#C41E54 → #FF20A1 → #FFC0DB</div></div>
  <div class="grad"><div class="name">Magenta</div><div class="bar" style="background: var(--grad-magenta)"></div><div class="stops">#C41E54 → #FF20A1 → #7861FF</div></div>
  <div class="grad"><div class="name">Violet</div><div class="bar" style="background: var(--grad-violet)"></div><div class="stops">#4F46E5 → #7861FF → #C41E54</div></div>
  <div class="grad"><div class="name">Spectrum</div><div class="bar" style="background: var(--grad-spectrum)"></div><div class="stops">#C41E54 → #FFC107 → #7030A0</div></div>
</body>
</html>
