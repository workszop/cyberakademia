<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<script src="https://unpkg.com/lucide@0.395.0/dist/umd/lucide.min.js"></script>
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .icon-box {
    width: 44px; height: 44px;
    border-radius: var(--radius-md);
    background: var(--magenta-tint);
    display: flex; align-items: center; justify-content: center;
    color: var(--quantica-pink);
  }
  .icon-box svg { width: 22px; height: 22px; stroke-width: 1.75; }
  .lbl { font-size: 10px; color: var(--fg-3); text-align: center; }
  .footer { margin-top: 14px; font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="grid">
    <div class="item"><div class="icon-box"><i data-lucide="cpu"></i></div><div class="lbl">AI / Model</div></div>
    <div class="item"><div class="icon-box"><i data-lucide="database"></i></div><div class="lbl">Data</div></div>
    <div class="item"><div class="icon-box"><i data-lucide="bar-chart-3"></i></div><div class="lbl">Analytics</div></div>
    <div class="item"><div class="icon-box"><i data-lucide="settings-2"></i></div><div class="lbl">Automation</div></div>
    <div class="item"><div class="icon-box"><i data-lucide="shield-check"></i></div><div class="lbl">Security</div></div>
    <div class="item"><div class="icon-box"><i data-lucide="cloud"></i></div><div class="lbl">Cloud</div></div>
    <div class="item"><div class="icon-box"><i data-lucide="users"></i></div><div class="lbl">Collaboration</div></div>
    <div class="item"><div class="icon-box"><i data-lucide="lightbulb"></i></div><div class="lbl">Insights</div></div>
    <div class="item"><div class="icon-box"><i data-lucide="zap"></i></div><div class="lbl">Performance</div></div>
    <div class="item"><div class="icon-box"><i data-lucide="headphones"></i></div><div class="lbl">Support</div></div>
  </div>
  <div class="footer">Lucide · 1.75px stroke · Quantica Pink on Magenta Tint</div>
  <script>lucide.createIcons();</script>
</body>
</html>
