<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); padding: 24px; }
  .row { display: flex; align-items: center; gap: 16px; padding: 6px 0; }
  .token { width: 50px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .px { width: 50px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .bar { background: var(--quantica-pink); height: 14px; border-radius: 3px; }
  .label { font-size: 11px; color: var(--fg-3); margin-left: 8px; }
</style>
</head>
<body>
  <div class="row"><div class="token">--space-1</div><div class="px">4px</div><div class="bar" style="width: 4px"></div></div>
  <div class="row"><div class="token">--space-2</div><div class="px">8px</div><div class="bar" style="width: 8px"></div></div>
  <div class="row"><div class="token">--space-3</div><div class="px">12px</div><div class="bar" style="width: 12px"></div></div>
  <div class="row"><div class="token">--space-4</div><div class="px">16px</div><div class="bar" style="width: 16px"></div><span class="label">component padding</span></div>
  <div class="row"><div class="token">--space-5</div><div class="px">24px</div><div class="bar" style="width: 24px"></div><span class="label">card padding</span></div>
  <div class="row"><div class="token">--space-6</div><div class="px">32px</div><div class="bar" style="width: 32px"></div></div>
  <div class="row"><div class="token">--space-7</div><div class="px">40px</div><div class="bar" style="width: 40px"></div></div>
  <div class="row"><div class="token">--space-8</div><div class="px">48px</div><div class="bar" style="width: 48px"></div><span class="label">section gap</span></div>
  <div class="row"><div class="token">--space-9</div><div class="px">64px</div><div class="bar" style="width: 64px"></div></div>
  <div class="row"><div class="token">--space-10</div><div class="px">96px</div><div class="bar" style="width: 96px"></div><span class="label">hero padding</span></div>
  <div class="row"><div class="token">--space-11</div><div class="px">128px</div><div class="bar" style="width: 128px"></div></div>
</body>
</html>
