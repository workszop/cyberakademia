<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); padding: 28px; }
  .display {
    font-size: 80px;
    line-height: 0.95;
    letter-spacing: -0.025em;
    font-weight: 700;
    color: var(--fg-1);
  }
  .display .pink { color: var(--quantica-pink); }
  .meta { display: flex; gap: 24px; margin-top: 16px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="display">Build Smarter.<br/><span class="pink">Scale Faster.</span></div>
  <div class="meta">
    <span>Satoshi Bold</span>
    <span>80 / 76</span>
    <span>tracking -2.5%</span>
  </div>
</body>
</html>
