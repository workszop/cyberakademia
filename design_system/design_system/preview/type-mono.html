<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Mono & Eyebrow</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); padding: 28px; display: flex; gap: 40px; align-items: center; }
  .col { flex: 1; }
  .label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 12px; }
  .eyebrow {
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--quantica-pink);
  }
  .eyebrow + .head { font-size: 22px; font-weight: 700; margin-top: 6px; letter-spacing: -0.01em; }
  .mono-block {
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.7;
    color: var(--fg-2);
    background: var(--bg-2);
    border-radius: var(--radius-md);
    padding: 14px 16px;
  }
  .mono-block .num { color: var(--quantica-pink); }
  .mono-block .com { color: var(--fg-3); }
</style>
</head>
<body>
  <div class="col">
    <div class="label">Eyebrow + heading</div>
    <div class="eyebrow">Primary palette</div>
    <div class="head">Foundation colors.</div>
  </div>
  <div class="col">
    <div class="label">Geist Mono — data &amp; code</div>
    <div class="mono-block">
<span class="com">// model accuracy</span><br/>
accuracy: <span class="num">92.4</span>%<br/>
delta:    <span class="num">+5.6</span>%<br/>
hours_saved: <span class="num">320</span>
    </div>
  </div>
</body>
</html>
