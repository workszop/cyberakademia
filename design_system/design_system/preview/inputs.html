<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); padding: 28px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-size: 11px; color: var(--fg-3); letter-spacing: 0.04em; }
  .input {
    font-family: var(--font-sans); font-size: 14px;
    padding: 11px 14px; border-radius: var(--radius-md);
    border: 1px solid var(--border-1); background: var(--bg-1);
    color: var(--fg-1); outline: none; width: 100%; box-sizing: border-box;
  }
  .input::placeholder { color: var(--fg-4); }
  .input.focus { border-color: var(--quantica-pink); box-shadow: 0 0 0 3px rgba(255, 77, 154, 0.25); }
  .input.error { border-color: var(--status-error); box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.20); }
  .input.disabled { background: var(--light-gray); color: var(--fg-4); cursor: not-allowed; }
  .helper { font-size: 11px; color: var(--fg-3); }
  .helper.error { color: var(--status-error); }
</style>
</head>
<body>
  <div class="field">
    <div class="lbl">Default</div>
    <input class="input" placeholder="name@quanticalab.ai" />
    <div class="helper">Work email</div>
  </div>
  <div class="field">
    <div class="lbl">Focused</div>
    <input class="input focus" value="alex@quanticalab.ai" />
    <div class="helper">Looks good.</div>
  </div>
  <div class="field">
    <div class="lbl">Error</div>
    <input class="input error" value="alex@" />
    <div class="helper error">Enter a valid email address.</div>
  </div>
</body>
</html>
