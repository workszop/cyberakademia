<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Navigation bar</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); padding: 0; }
  .nav {
    display: flex; align-items: center; gap: 32px;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border-1);
    height: 72px;
    box-sizing: border-box;
  }
  .logo { display: flex; align-items: center; }
  .logo img { display: block; height: 36px; width: auto; }
  .links { display: flex; align-items: center; gap: 24px; flex: 1; margin-left: 16px; }
  .links a { font-size: 14px; color: var(--fg-2); text-decoration: none; padding: 6px 0; border-bottom: 2px solid transparent; }
  .links a:hover { color: var(--fg-1); }
  .links a.active { color: var(--quantica-pink); border-bottom-color: var(--quantica-pink); }
  .cta {
    font-family: var(--font-sans); font-size: 13px; font-weight: 500;
    padding: 10px 18px; border-radius: var(--radius-pill);
    background: var(--quantica-pink); color: white; border: none; cursor: pointer;
  }
</style>
</head>
<body>
  <nav class="nav">
    <div class="logo">
      <img src="../assets/quantica-logo-color.png" alt="Quantica Lab" />
    </div>
    <div class="links">
      <a href="#" class="active">Solutions</a>
      <a href="#">Products</a>
      <a href="#">Advisory</a>
      <a href="#">Insights</a>
    </div>
    <button class="cta">Contact</button>
  </nav>
</body>
</html>
