<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Quantica Lab — AI products. Advisory. Business impact.</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.395.0/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="FeatureCard.jsx"></script>
<script type="text/babel" src="MetricsBand.jsx"></script>
<script type="text/babel" src="CTABand.jsx"></script>
<script type="text/babel">
  function App() {
    const [active, setActive] = React.useState('Solutions');
    React.useEffect(() => {
      const id = setTimeout(() => window.lucide && window.lucide.createIcons({ nameAttr: 'data-lucide-name' }), 0);
      return () => clearTimeout(id);
    });
    return (
      <div data-screen-label="Marketing site">
        <QLNav active={active} onNavigate={setActive} />
        <QLHero />
        <QLFeatureTriad />
        <QLMetricsBand />
        <QLCTABand />
        <QLFooter />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
