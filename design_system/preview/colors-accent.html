<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Accent palette</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); padding: 24px; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--inner-hairline); }
  .sw .chip { height: 76px; }
  .sw .meta { padding: 10px 12px 12px; }
  .sw .name { font-size: 13px; font-weight: 500; }
  .sw .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
  .sw .role { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-top: 6px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background: var(--electric-pink)"></div>
      <div class="meta"><div class="name">Electric Pink</div><div class="hex">#FF20A1</div><div class="role">Emphasis</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--violet)"></div>
      <div class="meta"><div class="name">Violet</div><div class="hex">#7861FF</div><div class="role">Emphasis</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--indigo)"></div>
      <div class="meta"><div class="name">Indigo</div><div class="hex">#4F46E5</div><div class="role">Emphasis</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--teal)"></div>
      <div class="meta"><div class="name">Violet</div><div class="hex">#7030A0</div><div class="role">Emphasis</div></div></div>
    <div class="sw"><div class="chip" style="background: var(--amber)"></div>
      <div class="meta"><div class="name">Amber</div><div class="hex">#FFC107</div><div class="role">Emphasis</div></div></div>
  </div>
</body>
</html>
