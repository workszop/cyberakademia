<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Hierarchy</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); padding: 28px; display: grid; grid-template-columns: 1fr 200px; gap: 32px; align-items: center; }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 16px; }
  .row .specimen { color: var(--fg-1); }
  .row .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-left: auto; }
  .h1 { font-size: 48px; line-height: 1.05; letter-spacing: -0.015em; font-weight: 700; }
  .h2 { font-size: 28px; line-height: 1.25; font-weight: 500; }
  .h3 { font-size: 20px; line-height: 1.4; font-weight: 500; }
  .body { font-size: 14px; line-height: 1.65; color: var(--fg-2); }
  .cap  { font-size: 12px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><span class="specimen h1">H1 — Build Smarter.</span></div>
    <div class="row"><span class="specimen h2">H2 — Intelligent systems for complex world.</span></div>
    <div class="row"><span class="specimen h3">H3 — Forecast. Optimize. Grow.</span></div>
    <div class="row"><span class="specimen body">Body — AI products and advisory that turn data into measurable business impact.</span></div>
    <div class="row"><span class="specimen cap">Caption — Updated 2 minutes ago</span></div>
  </div>
  <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); display: flex; flex-direction: column; gap: 14px;">
    <div>56/60 · -1%</div>
    <div>28/36</div>
    <div>20/28</div>
    <div>14/24</div>
    <div>12/18</div>
  </div>
</body>
</html>
