<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Particle wave motif</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); overflow: hidden; }
  body { font-family: var(--font-sans); color: var(--fg-1); }
  .stage { position: relative; height: 240px; }
  .stage canvas { width: 100%; height: 100%; display: block; }
  .caption {
    position: absolute; left: 24px; bottom: 18px;
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--fg-3);
  }
  .signature {
    position: absolute; left: 24px; top: 22px;
    font-size: 22px; font-weight: 700; letter-spacing: -0.01em;
    color: var(--fg-1);
  }
  .signature .pink { color: var(--quantica-pink); }
</style>
</head>
<body>
  <div class="stage">
    <canvas id="cvs"></canvas>
    <div class="signature">From data <span class="pink">to decisions.</span></div>
    <div class="caption">Signature visual · particle wave</div>
  </div>
  <script>
    const c = document.getElementById('cvs');
    const ctx = c.getContext('2d');
    let W = 0, H = 0, dpr = 1;
    function resize() {
      dpr = window.devicePixelRatio || 1;
      const r = c.getBoundingClientRect();
      W = r.width; H = r.height;
      c.width = W * dpr; c.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize(); addEventListener('resize', resize);

    // Real particles, each with persistent x/y/lane/speed.
    // They drift slowly LEFT-to-RIGHT, riding a sine wave on their lane.
    // When they exit the right edge they wrap to the left.
    const N = 320;
    const particles = [];
    for (let i = 0; i < N; i++) {
      const lane = Math.random();
      particles.push({
        x: Math.random(),                 // 0..1 across width
        lane,                             // 0..1 vertical lane
        amp: 18 + Math.random() * 18,     // wave amplitude px
        freq: 0.6 + Math.random() * 0.9,  // wave frequency
        phase: Math.random() * Math.PI * 2,
        speed: 0.012 + Math.random() * 0.020, // fraction of width per second — slow
        size: 0.6 + Math.random() * 1.6,
        // Density bias: more particles toward right side of image
        bias: lane,
      });
    }

    let last = performance.now();
    function draw(now) {
      const dt = Math.min(50, now - last) / 1000;
      last = now;
      ctx.clearRect(0, 0, W, H);

      // soft horizontal density falloff: weaker on left, dense on right
      for (const p of particles) {
        // advance slowly
        p.x += p.speed * dt;
        if (p.x > 1.05) p.x -= 1.1;

        const baseX = p.x * W;
        const baseY = p.lane * H;
        // wave displacement uses now (slow time) so particles oscillate
        // gently as they drift, never flickering.
        const t = now * 0.00025;
        const wave = Math.sin(p.x * Math.PI * 2 * p.freq + p.phase + t * 2) * p.amp;
        const y = baseY + wave;

        // density falloff: skip drawing some particles on the left
        const rightness = p.x;
        const alphaScale = 0.18 + 0.82 * rightness;
        const sizeScale  = 0.55 + 0.65 * rightness;

        // skip drawing particles too far left (sparse)
        if (rightness < 0.02) continue;

        const hue = 330 + Math.sin(p.x * 6 + t) * 6;
        ctx.fillStyle = `hsla(${hue}, 100%, ${44 + rightness * 8}%, ${alphaScale})`;
        ctx.beginPath();
        ctx.arc(baseX, y, p.size * sizeScale, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
  </script>
</body>
</html>
