<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body {
    font-family: var(--font-sans);
    color: var(--fg-1);
    height: 200px;
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .panel { display: flex; align-items: center; justify-content: center; padding: 24px; }
  .panel.dark { background: var(--near-black); }
  .panel img { max-width: 80%; max-height: 120px; object-fit: contain; }
</style>
</head>
<body>
  <div class="panel"><img src="../assets/quantica-logo-color.png" alt="Quantica Lab" /></div>
  <div class="panel dark"><img src="../assets/quantica-logo-white.png" alt="Quantica Lab" /></div>
</body>
</html>
