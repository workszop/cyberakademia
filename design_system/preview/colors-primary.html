<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Primary palette</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; background: var(--bg-1); }
  body { font-family: var(--font-sans); color: var(--fg-1); padding: 24px; }
  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 14px; }
  .title { font-size: 13px; font-weight: 600; }
  .badge {
    font-size: 9px; padding: 3px 8px; border-radius: 999px;
    background: var(--magenta-tint); color: var(--quantica-pink);
    font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; box-shadow: var(--inner-hairline); }
  .sw .chip { height: 76px; }
  .sw .meta { padding: 10px 12px 12px; }
  .sw .name { font-size: 13px; font-weight: 500; color: var(--fg-1); }
  .sw .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-top: 2px; }
  .sw .role { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); margin-top: 6px; }
  .note { font-size: 11px; color: var(--fg-3); margin-top: 12px; }
</style>
</head>
<body>
  <div class="head">
    <div class="title">Magenta + Violet</div>
    <span class="badge">Adopted</span>
  </div>
  <div class="row">
    <div class="sw">
      <div class="chip" style="background: #C41E54"></div>
      <div class="meta"><div class="name">Viva Magenta</div><div class="hex">#C41E54</div><div class="role">Foundation</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: #7030A0"></div>
      <div class="meta"><div class="name">Violet</div><div class="hex">#7030A0</div><div class="role">Emphasis</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: #4F1F75"></div>
      <div class="meta"><div class="name">Deep Violet</div><div class="hex">#4F1F75</div><div class="role">Foundation</div></div>
    </div>
    <div class="sw">
      <div class="chip" style="background: #0A1F2C"></div>
      <div class="meta"><div class="name">Ink</div><div class="hex">#0A1F2C</div><div class="role">Foundation</div></div>
    </div>
    <div class="sw" style="box-shadow: inset 0 0 0 1px var(--border-1)">
      <div class="chip" style="background: #F0F8F6"></div>
      <div class="meta"><div class="name">Mist</div><div class="hex">#F0F8F6</div><div class="role">Atmosphere</div></div>
    </div>
  </div>
  <div class="note">Futuristic / technical direction — Viva Magenta as the hero, violet pair for secondary accents and structure, deep ink for grounding.</div>
</body>
</html>
